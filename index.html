<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Penguin - Inicio</title>
    <style>
        body { 
            background: #0066cc; 
            color: white; 
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 30px;
            border: 5px solid #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3rem; text-shadow: 2px 2px #000; margin-bottom: 10px; }
        .pingu { font-size: 80px; margin-bottom: 20px; }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background: #ffcc00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 5px 0 #cca300;
            transition: 0.1s;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #cca300;
        }
        .status { margin-top: 15px; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="pingu">🐧</div>
        <h1>CLUB PENGUIN</h1>
        <p>PattitexTEC Edition</p>
        <button id="btn-play">¡A JUGAR!</button>
        <div id="status" class="status"></div>
    </div>

    <script src="cuentas/login.js"></script>
    <script>
        const btn = document.getElementById('btn-play');
        const status = document.getElementById('status');

        btn.onclick = async function() {
            status.innerText = "Conectando al servidor...";
            btn.disabled = true;

            await AuthSystem.inicializar();
            const user = await AuthSystem.login();
            
            if (user) {
                status.innerText = "¡Bienvenido, " + user.nombre + "!";
                // Guardamos los datos para el juego
                sessionStorage.setItem('pinguino_actual', JSON.stringify(user));
                
                // Redirigimos después de un momento
                setTimeout(() => {
                    window.location.href = "game.html";
                }, 1000);
            } else {
                status.innerText = "Error al iniciar sesión.";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
