<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Club Penguin - PattitexTEC</title>
    <style>
        body {
            background: #0099ff url('assets/maps/mapa1.png') no-repeat center center;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            overflow: hidden;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 74, 141, 0.6); z-index: 0;
        }
        .login-card {
            position: relative; z-index: 1; background: #0059b3; border: 6px solid #ffffff;
            border-radius: 40px; padding: 40px; width: 340px; text-align: center;
            box-shadow: 0 15px 0 rgba(0,0,0,0.2);
        }
        .preview-container {
            background: #fff; width: 140px; height: 140px; margin: -90px auto 10px auto;
            border-radius: 50%; border: 6px solid #0059b3; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }
        .preview-container img { width: 110%; height: auto; margin-top: 10px; }
        .logo-main { width: 100%; height: auto; margin-bottom: 20px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn-play {
            background: #99cc00; color: white; font-size: 28px; padding: 12px 0; width: 100%;
            border: none; border-radius: 15px; cursor: pointer; font-weight: bold;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3); box-shadow: 0 6px 0 #669900; transition: all 0.1s;
        }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #669900; }
        .status { margin-top: 20px; height: 20px; font-size: 14px; color: #ffcc00; }
        #pingu-counter {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
            color: #fff; padding: 10px 20px; border-radius: 30px; border: 3px solid #fff;
            font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="pingu-counter" style="position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; border: 3px solid #fff; z-index: 1000;"><a href='https://www.counter12.com'><img src='https://www.counter12.com/img-ac4dWxZdwC3yC5x0-8.gif' border='0' alt='conter12'></a><script type='text/javascript' src='https://www.counter12.com/ad.js?id=ac4dWxZdwC3yC5x0'></script></div>

    <div class="login-card">
        <div class="preview-container"><img src="assets/pingüino/preview.png" alt="Preview"></div>
        <img src="assets/etc/ui%26gui/logo.png" class="logo-main" alt="Logo">
        <button class="btn-play" id="btn-play">¡A JUGAR!</button>
        <div id="status" class="status"></div>
    </div>

    <script src="cuentas/login.js"></script>
    <script>
        const btn = document.getElementById('btn-play');
        const status = document.getElementById('status');

        window.onload = function() {
            fetch("https://api.countapi.xyz/hit/pattitextec.github.io/pattitex-cp-plaza")
                .then(res => res.json()).then(data => { document.getElementById("count-val").innerText = data.value; })
                .catch(() => { document.getElementById("count-val").innerText = "Online"; });

            const saved = localStorage.getItem("pinguino_actual");
            if (saved) {
                const user = JSON.parse(saved);
                status.innerText = "¡Hola de nuevo, " + user.nombre + "!";
            }
        };

        btn.onclick = async function() {
            status.innerText = "Sincronizando...";
            btn.disabled = true;
            await AuthSystem.inicializar();
            const user = JSON.parse(localStorage.getItem("pinguino_actual")) || await AuthSystem.login();

            if (user) {
                localStorage.setItem('pinguino_actual', JSON.stringify(user));
                window.location.href = "game.html";
            } else {
                status.innerText = "Error de conexión";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
